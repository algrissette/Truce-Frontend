services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: trucelofficiel
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./trucedata.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    image: algrissette/trucel-backend:latest
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      - db
    restart: always

  frontend:
    image: algrissette/trucel-frontend:latest
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  db_data:
  caddy_data:
  caddy_config: